name: FocusLock Daily Spark
on:
  schedule:
    # Runs at 07:00 UTC (10:00 AM EAT) - Once daily
    - cron: '0 7 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  generate-idea:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For auto-commit
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # Cache dependencies
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Clean JSON files (remove BOM if present)
      run: |
        python << 'EOF'
        import json
        import os
        
        for filepath in ['data/ideas.json', 'data/history.json']:
            if os.path.exists(filepath):
                try:
                    with open(filepath, 'r', encoding='utf-8-sig') as f:
                        data = json.load(f)
                    with open(filepath, 'w', encoding='utf-8') as f:
                        json.dump(data, f, indent=2)
                    print(f'Cleaned {filepath}')
                except Exception as e:
                    print(f'Error cleaning {filepath}: {e}')
        EOF
    
    - name: Install & Start Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        echo "Starting Ollama server..."
        # Start Ollama in background
        nohup ollama serve > /tmp/ollama.log 2>&1 &
        OLLAMA_PID=$!
        echo "Ollama PID: $OLLAMA_PID"
        
        # Wait up to 30 seconds for Ollama to be ready
        echo "Waiting for Ollama to start..."
        for i in {1..30}; do
          if curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
            echo "✓ Ollama is ready!"
            break
          fi
          echo "Waiting... ($i/30)"
          sleep 1
        done
        
        # Final check
        if ! curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
          echo "✗ Ollama failed to start, checking logs..."
          cat /tmp/ollama.log
          exit 1
        fi
    
    - name: Pull Phi-3 model
      run: |
        ollama pull phi3:mini
        echo " Model ready"
    
    - name: Run FocusLock
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        echo " Starting FocusLock..."
        python focuslock.py
        echo "FocusLock complete"
    
    - name: Commit updated history
      run: |
        git config --local user.email "manusiele254@gmail.com"
        git config --local user.name "manusiele"
        # Add any changes from BOM cleanup
        git add data/ideas.json data/history.json || true
        git pull --rebase origin main || true
        # Copy to public folder for Next.js
        cp data/ideas.json public/ideas.json
        cp data/history.json public/history.json
        git add data/history.json data/ideas.json public/ideas.json public/history.json
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M EAT')
          git commit -m "📝 Daily spark delivered: $TIMESTAMP"
          git push
          echo "✓ History updated"
        fi
      continue-on-error: true
    
    - name: Job Summary
      if: always()
      run: |
        echo "##  FocusLock Daily Report" >> $GITHUB_STEP_SUMMARY
        echo "- **Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Next run:** Tomorrow at 10:00 AM EAT" >> $GITHUB_STEP_SUMMARY
